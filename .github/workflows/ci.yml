name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nitin4613/demo-service

permissions:
  contents: read
  packages: write
  pull-requests: write
  checks: write

jobs:

  comment-pr-build-number:
    name: Comment Build Number on PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Build Started - Build Number: #${context.runNumber}`
            });

  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('build.gradle', 'settings.gradle') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Setup Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.12
          chmod +x ./gradlew

      - name: Run Unit Tests
        run: ./gradlew test --parallel --build-cache --no-daemon

      - name: Generate Coverage Report
        run: ./gradlew jacocoTestReport --no-daemon

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: |
            build/test-results/test/
            build/reports/tests/test/
            build/reports/jacoco/

  frontend-tests:
    name: Run Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

      - name: Run Jest Tests
        run: npm test
        env:
          CI: "true"

  build-and-publish:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    needs: [unit-tests, frontend-tests]
    outputs:
      image_tag: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging (${{ matrix.region }})
    runs-on: ubuntu-latest
    needs: [build-and-publish]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
    strategy:
      matrix:
        include:
          - region: namer
            aws_region: us-west-2
            cluster: demo-usw2-namer
          - region: emea
            aws_region: eu-west-2
            cluster: demo-euw2-emea
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to Staging (${{ matrix.region }})
        run: |
          echo "======================================"
          echo "Deploying to Staging - ${{ matrix.region }}"
          echo "======================================"
          echo "Image:     ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}"
          echo "Region:    ${{ matrix.region }}"
          echo "Cluster:   ${{ matrix.cluster }}"
          echo "Namespace: demo-staging"
          echo "======================================"
          echo ""
          echo "Authenticating with AWS via OIDC..."
          echo "  aws eks update-kubeconfig --name ${{ matrix.cluster }} --region ${{ matrix.aws_region }}"
          echo ""
          echo "Deploying with Helm..."
          echo "  helm upgrade --atomic --install demo-service ./helm"
          echo "    --namespace demo-staging"
          echo "    --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "    --set image.tag=${{ github.run_number }}"
          echo "    --set region=${{ matrix.region }}"
          echo "    --set rollout.enabled=false"
          echo ""
          echo "Waiting for rollout..."
          echo "  kubectl rollout status deployment/demo-service -n demo-staging --timeout=300s"
          echo ""
          echo "Deployment to ${{ matrix.region }} staging complete"

  smoke-tests:
    name: Smoke Tests (${{ matrix.region }})
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    strategy:
      matrix:
        region: [namer, emea]
    steps:
      - name: Run Smoke Tests (${{ matrix.region }})
        run: |
          echo "======================================"
          echo "Running Smoke Tests - ${{ matrix.region }}"
          echo "======================================"
          echo ""
          echo "Checking health endpoint..."
          echo "  curl -sf https://staging.${{ matrix.region }}.demo.dev/actuator/health"
          echo "  Response: { \"status\": \"UP\" }"
          echo ""
          echo "Checking readiness endpoint..."
          echo "  curl -sf https://staging.${{ matrix.region }}.demo.dev/actuator/health/readiness"
          echo "  Response: { \"status\": \"UP\" }"
          echo ""
          echo "Checking API endpoint..."
          echo "  curl -sf https://staging.${{ matrix.region }}.demo.dev/api/v1/resource"
          echo "  Response: { \"content\": [], \"totalElements\": 0 }"
          echo ""
          echo "All smoke tests passed for ${{ matrix.region }}"

  e2e-tests:
    name: E2E Tests (Shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package.json') }}

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests (Shard ${{ matrix.shard }}/4)
        run: |
          mkdir -p test-results
          npx playwright test \
            --shard=${{ matrix.shard }}/4 \
            --reporter=junit,html
        env:
          CI: "true"
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: test-results/junit.xml

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results-shard-${{ matrix.shard }}
          path: |
            test-results/
            playwright-report/

  deployment-gate:
    name: Query Deployment Qualification
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      deploy_mode: ${{ steps.check.outputs.deploy_mode }}
    steps:
      - uses: actions/checkout@v6

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Check Deployment Authorization
        id: check
        run: |
          echo "======================================"
          echo "Deployment Qualification Check"
          echo "======================================"

          DEPLOY_MODE=$(yq '.deployment_mode' service-meta.yml)
          DEPLOY_FREEZE=$(yq '.deployment_freeze' service-meta.yml)
          SERVICE_NAME=$(yq '.service.name' service-meta.yml)

          echo "Service:           ${SERVICE_NAME}"
          echo "Deployment Mode:   ${DEPLOY_MODE}"
          echo "Deployment Freeze: ${DEPLOY_FREEZE}"

          if [ "$DEPLOY_FREEZE" = "true" ]; then
            echo ""
            echo "BLOCKED: Deployment freeze is active"
            exit 1
          fi

          echo "deploy_mode=${DEPLOY_MODE}" >> $GITHUB_OUTPUT
          echo ""
          echo "Deployment qualified (mode: ${DEPLOY_MODE})"

  trigger-prod-deploy:
    name: Trigger Production Deployment
    runs-on: ubuntu-latest
    needs: [deployment-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Handle Deployment Mode
        run: |
          DEPLOY_MODE="${{ needs.deployment-gate.outputs.deploy_mode }}"

          if [ "$DEPLOY_MODE" = "auto" ]; then
            echo "======================================"
            echo "AUTO DEPLOYMENT MODE"
            echo "======================================"
            echo "Triggering production deployment automatically..."
            echo "  workflow_dispatch: deploy-prod.yml"
            echo "  Build: #${{ github.run_number }}"
            echo "  Commit: ${{ github.sha }}"
          else
            echo "======================================"
            echo "MANUAL DEPLOYMENT MODE"
            echo "======================================"
            echo "Deployment candidate registered."
            echo "Production deployment requires manual trigger."
            echo ""
            echo "To deploy, go to:"
            echo "  Actions > Production Deployment > Run workflow"
            echo "  Tag: ${{ github.run_number }}"
          fi
