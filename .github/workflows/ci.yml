name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nitin4613/multirepo-demo

jobs:
  unit-tests:
    name: Unit Tests (Java)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.lock') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build with Gradle
        run: ./gradlew build -x integrationTest

      - name: Run Unit Tests
        run: ./gradlew test --no-daemon

      - name: Generate JaCoCo Coverage Report
        run: ./gradlew jacocoTestReport

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: |
            **/build/test-results/test/
            **/build/reports/jacoco/test/html/

      - name: Publish Test Report
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: '**/build/test-results/test/TEST-*.xml'
          check_name: Unit Test Results

  frontend-tests:
    name: Frontend Tests (Node)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Jest Tests with Coverage
        run: npm run test:coverage

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-test-results
          path: |
            coverage/
            junit.xml

  build-and-publish:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    needs: [unit-tests, frontend-tests]
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.run_number }}
            type=ref,event=branch
            type=sha,prefix={{branch}}-

      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deployment-gate:
    name: Deployment Gate
    runs-on: ubuntu-latest
    needs: [build-and-publish]
    permissions:
      contents: read
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      freeze_status: ${{ steps.check.outputs.freeze_status }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Check service-meta.yml for deployment mode
        id: check
        run: |
          if [ -f "service-meta.yml" ]; then
            DEPLOYMENT_MODE=$(yq eval '.deployment_mode' service-meta.yml)
            FREEZE_STATUS=$(yq eval '.freeze_status // "active"' service-meta.yml)
          else
            DEPLOYMENT_MODE="auto"
            FREEZE_STATUS="active"
          fi

          if [ "$DEPLOYMENT_MODE" = "auto" ] && [ "$FREEZE_STATUS" = "active" ]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

          echo "freeze_status=$FREEZE_STATUS" >> $GITHUB_OUTPUT

  deploy-staging-na:
    name: Deploy Staging NA
    runs-on: ubuntu-latest
    needs: [build-and-publish, deployment-gate]
    permissions:
      id-token: write
      contents: read
    environment:
      name: staging
      url: https://staging-na.demo.example.com
    if: needs.deployment-gate.outputs.should_deploy == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: us-west-2

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: '3.13.0'

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name cera-usw2-namer \
            --region us-west-2

      - name: Deploy with Helm
        run: |
          helm repo add multirepo-demo ${{ secrets.HELM_REPO_URL }}
          helm repo update

          helm upgrade --install multirepo-demo multirepo-demo/multirepo-demo \
            --namespace demo-staging \
            --create-namespace \
            --values helm/values-staging-na.yaml \
            --set image.tag=${{ github.run_number }} \
            --set region=us-west-2 \
            --wait \
            --timeout 10m

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/multirepo-demo \
            -n demo-staging \
            --timeout=5m

  deploy-staging-eu:
    name: Deploy Staging EU
    runs-on: ubuntu-latest
    needs: [build-and-publish, deployment-gate]
    permissions:
      id-token: write
      contents: read
    environment:
      name: staging
      url: https://staging-eu.demo.example.com
    if: needs.deployment-gate.outputs.should_deploy == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: eu-west-2

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: '3.13.0'

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name cera-euw2-emea \
            --region eu-west-2

      - name: Deploy with Helm
        run: |
          helm repo add multirepo-demo ${{ secrets.HELM_REPO_URL }}
          helm repo update

          helm upgrade --install multirepo-demo multirepo-demo/multirepo-demo \
            --namespace demo-staging \
            --create-namespace \
            --values helm/values-staging-eu.yaml \
            --set image.tag=${{ github.run_number }} \
            --set region=eu-west-2 \
            --wait \
            --timeout 10m

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/multirepo-demo \
            -n demo-staging \
            --timeout=5m

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-staging-na, deploy-staging-eu]
    permissions:
      contents: read
    if: always() && (needs.deploy-staging-na.result == 'success' || needs.deploy-staging-eu.result == 'success')
    strategy:
      matrix:
        region: [na, eu]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Smoke Tests - Region ${{ matrix.region }}
        run: npm run test:smoke -- --region=${{ matrix.region }}
        env:
          STAGING_ENDPOINT_NA: https://staging-na.demo.example.com
          STAGING_ENDPOINT_EU: https://staging-eu.demo.example.com

      - name: Upload Smoke Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-tests-${{ matrix.region }}
          path: test-results/smoke/

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    permissions:
      contents: read
    if: success()
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests - Shard ${{ matrix.shard }}/4
        run: |
          npm run test:e2e -- \
            --shard=${{ matrix.shard }}/4 \
            --reporter=junit \
            --reporter=list

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results-shard-${{ matrix.shard }}
          path: test-results/

  publish-results:
    name: Publish Results
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    permissions:
      contents: read
      pull-requests: write
    if: always()
    steps:
      - uses: actions/checkout@v6

      - name: Download all test results
        uses: actions/download-artifact@v8
        with:
          path: all-test-results/

      - name: Publish PR Comment with Build Number
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const buildNumber = context.runNumber;
            const buildUrl = context.payload.pull_request.html_url;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## CI Pipeline Results\n\n✓ Build #${buildNumber}\n\nView full workflow: [Actions](${context.payload.pull_request.html_url})`
            });

  trigger-prod-deploy:
    name: Trigger Production Deploy
    runs-on: ubuntu-latest
    needs: [e2e-tests, deployment-gate]
    permissions:
      contents: read
      id-token: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.deployment-gate.outputs.should_deploy == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Trigger Production Deployment
        uses: actions/github-script@v9
        with:
          script: |
            const workflowId = 'deploy-prod.yml';
            const inputs = {
              build_number: '${{ github.run_number }}',
              image_tag: '${{ github.run_number }}'
            };

            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              ref: 'main',
              inputs: inputs
            });

            console.log(`Triggered ${workflowId} with build #${inputs.build_number}`);

      - name: Create Deployment Candidate Record
        run: |
          cat >> deployment-candidates.txt << EOF
          Build #${{ github.run_number }}
          Timestamp: $(date -Iseconds)
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
          EOF

      - name: Upload Deployment Candidate
        uses: actions/upload-artifact@v7
        with:
          name: deployment-candidate-${{ github.run_number }}
          path: deployment-candidates.txt
          retention-days: 90
