name: Production Deployment

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: 'Service name to deploy'
        required: true
        type: string
      tag:
        description: 'Docker image tag to promote'
        required: true
        type: string
      region:
        description: 'Deployment region'
        required: true
        type: choice
        options:
          - all
          - namer
          - emea
  workflow_call:
    inputs:
      service_name:
        description: 'Service name to deploy'
        required: true
        type: string
      tag:
        description: 'Docker image tag to promote'
        required: true
        type: string
      region:
        description: 'Deployment region'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  REGISTRY_ORG: nitin4613
  DEMO_SERVICE: demo-service

permissions:
  id-token: write
  contents: write
  deployments: write
  statuses: write

concurrency:
  group: prod-deployment-${{ github.ref }}
  cancel-in-progress: false

jobs:
  promote-image:
    name: Promote Image to Prod
    runs-on: ubuntu-latest
    outputs:
      prod_image: ${{ steps.promote.outputs.prod_image }}
    steps:
      - name: Promote Docker image
        id: promote
        run: |
          SOURCE_IMAGE="${{ env.REGISTRY }}/${{ env.REGISTRY_ORG }}/${{ env.DEMO_SERVICE }}:${{ inputs.tag }}"
          PROD_IMAGE="${{ env.REGISTRY }}/${{ env.REGISTRY_ORG }}/${{ env.DEMO_SERVICE }}:prod-${{ inputs.tag }}"
          echo "source_image=${SOURCE_IMAGE}" >> $GITHUB_OUTPUT
          echo "prod_image=${PROD_IMAGE}" >> $GITHUB_OUTPUT
          echo "Promoting image from ${SOURCE_IMAGE} to ${PROD_IMAGE}"

  deploy-canary-na:
    name: Deploy Canary to NA
    needs: promote-image
    runs-on: ubuntu-latest
    environment: production
    if: ${{ inputs.region == 'all' || inputs.region == 'namer' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-west-2

      - name: Get kubeconfig for NA
        run: |
          aws eks update-kubeconfig \
            --region us-west-2 \
            --name cera-usw2-namer

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Deploy canary with Helm
        run: |
          helm upgrade --install ${{ inputs.service_name }}-canary ./helm/charts/${{ inputs.service_name }} \
            --namespace demo-prod \
            --create-namespace \
            --values ./helm/values/prod-na.yaml \
            --set image.repository=${{ env.REGISTRY }}/${{ env.REGISTRY_ORG }}/${{ env.DEMO_SERVICE }} \
            --set image.tag=prod-${{ inputs.tag }} \
            --set argo.rollouts.enabled=true \
            --set argo.rollouts.canaryWeight=10 \
            --wait \
            --timeout 10m

      - name: Create deployment status
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production-na',
              required_contexts: [],
              auto_merge: false
            });

  deploy-canary-eu:
    name: Deploy Canary to EU
    needs: promote-image
    runs-on: ubuntu-latest
    environment: production
    if: ${{ inputs.region == 'all' || inputs.region == 'emea' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: eu-west-2

      - name: Get kubeconfig for EU
        run: |
          aws eks update-kubeconfig \
            --region eu-west-2 \
            --name cera-euw2-emea

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Deploy canary with Helm
        run: |
          helm upgrade --install ${{ inputs.service_name }}-canary ./helm/charts/${{ inputs.service_name }} \
            --namespace demo-prod \
            --create-namespace \
            --values ./helm/values/prod-eu.yaml \
            --set image.repository=${{ env.REGISTRY }}/${{ env.REGISTRY_ORG }}/${{ env.DEMO_SERVICE }} \
            --set image.tag=prod-${{ inputs.tag }} \
            --set argo.rollouts.enabled=true \
            --set argo.rollouts.canaryWeight=10 \
            --wait \
            --timeout 10m

      - name: Create deployment status
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production-eu',
              required_contexts: [],
              auto_merge: false
            });

  monitor-rollout:
    name: Monitor Argo Rollout Analysis
    needs: [deploy-canary-na, deploy-canary-eu]
    runs-on: ubuntu-latest
    if: always() && (needs.deploy-canary-na.result == 'success' || needs.deploy-canary-eu.result == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-west-2

      - name: Get kubeconfig for NA
        if: ${{ inputs.region == 'all' || inputs.region == 'namer' }}
        run: |
          aws eks update-kubeconfig \
            --region us-west-2 \
            --name cera-usw2-namer

      - name: Monitor NA rollout
        if: ${{ inputs.region == 'all' || inputs.region == 'namer' }}
        run: |
          echo "Monitoring Argo Rollout for NA deployment..."
          kubectl argo rollouts status ${{ inputs.service_name }}-canary -n demo-prod --timeout=5m

      - name: Configure AWS credentials for EU
        if: ${{ inputs.region == 'all' || inputs.region == 'emea' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: eu-west-2

      - name: Get kubeconfig for EU
        if: ${{ inputs.region == 'all' || inputs.region == 'emea' }}
        run: |
          aws eks update-kubeconfig \
            --region eu-west-2 \
            --name cera-euw2-emea

      - name: Monitor EU rollout
        if: ${{ inputs.region == 'all' || inputs.region == 'emea' }}
        run: |
          echo "Monitoring Argo Rollout for EU deployment..."
          kubectl argo rollouts status ${{ inputs.service_name }}-canary -n demo-prod --timeout=5m

  full-rollout:
    name: Promote Canary to Full Rollout
    needs: monitor-rollout
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials for NA
        if: ${{ inputs.region == 'all' || inputs.region == 'namer' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-west-2

      - name: Get kubeconfig for NA
        if: ${{ inputs.region == 'all' || inputs.region == 'namer' }}
        run: |
          aws eks update-kubeconfig \
            --region us-west-2 \
            --name cera-usw2-namer

      - name: Promote NA canary
        if: ${{ inputs.region == 'all' || inputs.region == 'namer' }}
        run: |
          echo "Promoting NA canary to full rollout..."
          kubectl argo rollouts promote ${{ inputs.service_name }}-canary -n demo-prod

      - name: Configure AWS credentials for EU
        if: ${{ inputs.region == 'all' || inputs.region == 'emea' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: eu-west-2

      - name: Get kubeconfig for EU
        if: ${{ inputs.region == 'all' || inputs.region == 'emea' }}
        run: |
          aws eks update-kubeconfig \
            --region eu-west-2 \
            --name cera-euw2-emea

      - name: Promote EU canary
        if: ${{ inputs.region == 'all' || inputs.region == 'emea' }}
        run: |
          echo "Promoting EU canary to full rollout..."
          kubectl argo rollouts promote ${{ inputs.service_name }}-canary -n demo-prod

  create-release:
    name: Create GitHub Release
    needs: full-rollout
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = 'v${{ inputs.tag }}';
            let releaseNotes = '';
            try {
              const changelog = require('fs').readFileSync('CHANGELOG.md', 'utf8');
              // Extract notes for this version
              const versionRegex = new RegExp(`## \\[${tag}\\][\\s\\S]*?(?=## \\[|$)`);
              const match = changelog.match(versionRegex);
              if (match) {
                releaseNotes = match[0];
              }
            } catch (e) {
              console.log('CHANGELOG.md not found, using auto-generated notes');
            }

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: releaseNotes || 'Automated production deployment',
              draft: false,
              prerelease: false
            });
            console.log(`Created release: ${release.data.html_url}`);

      - name: Deployment success notification
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment.id || 0,
              state: 'success',
              environment_url: 'https://prod.demo-service.example.com',
              description: 'Production deployment completed successfully'
            });
