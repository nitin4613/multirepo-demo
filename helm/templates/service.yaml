{{- if not .Values.rollout.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cargurus-service.fullname" . }}
  labels:
    {{- include "cargurus-service.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "cargurus-service.selectorLabels" . | nindent 4 }}
{{- end }}
---
{{- if .Values.rollout.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cargurus-service.fullname" . }}-canary
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cargurus-service.labels" . | nindent 4 }}
    service-type: canary
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "cargurus-service.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cargurus-service.fullname" . }}-stable
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cargurus-service.labels" . | nindent 4 }}
    service-type: stable
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "cargurus-service.selectorLabels" . | nindent 4 }}
{{- end }}