service:
  name: demo-service
  team: platform-engineering

deployment_mode: manual
deployment_freeze: false
run_e2e: true

regions:
  - namer
  - emea

environments:
  staging:
    cluster: demo-usw2-namer
    namespace: demo-staging
  production:
    cluster: demo-usw2-prod
    namespace: demo-prod

idp:
  enabled: true
  platform: github

  catalog:
    service_id: multirepo-demo
    tier: medium
    owner: platform-engineering
    tags:
      - multi-repo
      - java
      - kubernetes

  services:
    - backend
    - frontend
    - cron-jobs
    - shared-libraries
    - sql-scripts

  environments:
    - Staging
    - Production

  regions:
    NA: namer
    EU: emea

  deployment:
    require_approval: true
    min_approvers: 1
    approver_groups:
      - platform-engineering
      - release-managers
    candidate_ttl: 24

  notifications:
    on_staging_success: true
    on_deploy_complete: true
    on_deploy_failure: true
    slack_channel: "#deployments"

  webhook:
    enabled: true
    validate_signature: true
