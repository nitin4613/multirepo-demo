version: 2.1

executors:
  jdk17:
    docker:
      - image: cimg/openjdk:17.0
    resource_class: small
  node20:
    docker:
      - image: cimg/node:20.18
    resource_class: small
  base:
    docker:
      - image: cimg/base:2025.01
    resource_class: small

parameters:
  service_name:
    type: string
    default: ""  # Will auto-derive from CIRCLE_PROJECT_REPONAME

commands:
  set-service-name:
    description: Set SERVICE_NAME from parameter or derive from repo name
    steps:
      - run:
          name: Set service name
          command: |
            if [ -n "<< pipeline.parameters.service_name >>" ]; then
              SERVICE_NAME="<< pipeline.parameters.service_name >>"
            else
              SERVICE_NAME=$(echo "${CIRCLE_PROJECT_REPONAME}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')
            fi
            echo "export SERVICE_NAME=${SERVICE_NAME}" >> $BASH_ENV
            echo "Service name: ${SERVICE_NAME}"

  notify-taillight:
    parameters:
      status:
        type: string
      stage:
        type: string
      message:
        type: string
    steps:
      - run:
          name: Notify Taillight
          command: echo "Taillight [<< parameters.status >>] << parameters.stage >> - << parameters.message >>"

  notify-taillight-failure:
    parameters:
      stage:
        type: string
      message:
        type: string
        default: "Job failed"
    steps:
      - run:
          name: Notify Taillight Failure
          when: on_fail
          command: echo "Taillight [FAILURE] << parameters.stage >> - << parameters.message >>"

jobs:
  sonarqube-analysis:
    executor: jdk17
    steps:
      - checkout
      - set-service-name
      - run:
          name: Run SonarQube Analysis
          command: |
            echo "=== SonarQube Code Analysis ==="
            echo "sonar-scanner \\"
            echo "  -Dsonar.projectKey=${SERVICE_NAME} \\"
            echo "  -Dsonar.host.url=\$SONAR_HOST_URL \\"
            echo "  -Dsonar.login=\$SONAR_TOKEN"
            echo ""
            echo "Analysis Results:"
            echo "  Quality Gate: PASSED"
            echo "  Bugs: 0"
            echo "  Vulnerabilities: 0"
            echo "  Code Smells: 3"
            echo "  Coverage: 82.4%"
            echo "  Duplications: 1.2%"
      - notify-taillight:
          status: "success"
          stage: "sonarqube"
          message: "SonarQube analysis passed"
      - notify-taillight-failure:
          stage: "sonarqube"

  semgrep-scan:
    executor: base
    steps:
      - checkout
      - run:
          name: Run Semgrep Security Scan
          command: |
            echo "=== Semgrep Security Scan ==="
            echo "semgrep --config=auto --config=p/owasp-top-ten ."
            echo ""
            echo "Scan Results:"
            echo "  Rules: 2,847 loaded"
            echo "  Files scanned: 156"
            echo "  Findings:"
            echo "    Critical: 0"
            echo "    High: 0"
            echo "    Medium: 0"
            echo "    Low: 2 (informational)"
            echo "  Status: PASSED"
      - notify-taillight:
          status: "success"
          stage: "semgrep"
          message: "Semgrep scan passed"
      - notify-taillight-failure:
          stage: "semgrep"

  sox-compliance:
    executor: base
    steps:
      - checkout
      - run:
          name: SOX Compliance Check
          command: |
            echo "=== SOX Compliance Verification ==="
            echo ""
            echo "Checking SOX Controls..."
            echo "  [✓] Change Management: PR requires approval"
            echo "  [✓] Access Control: Branch protection enabled"
            echo "  [✓] Audit Trail: All commits signed"
            echo "  [✓] Segregation of Duties: Author != Approver"
            echo "  [✓] Code Review: At least 1 approval required"
            echo ""
            echo "Compliance Status: COMPLIANT"
            echo "Audit ID: SOX-<< pipeline.number >>-$(date +%Y%m%d)"
      - notify-taillight:
          status: "success"
          stage: "sox-compliance"
          message: "SOX compliance verified"
      - notify-taillight-failure:
          stage: "sox-compliance"

  smartbear-contract-tests:
    executor: base
    steps:
      - checkout
      - set-service-name
      - run:
          name: Run SmartBear API Contract Tests
          command: |
            echo "=== SmartBear API Hub Contract Tests ==="
            echo ""
            echo "Validating API contracts against OpenAPI spec..."
            echo "  API Spec: openapi/api-spec.yaml"
            echo "  Contract Version: 2.1.0"
            echo ""
            echo "Running contract tests..."
            echo "  swaggerhub api:validate AwesomeCICD/${SERVICE_NAME}/2.1.0"
            echo ""
            echo "Contract Validation Results:"
            echo "  [✓] Schema validation: PASSED"
            echo "  [✓] Breaking changes: NONE DETECTED"
            echo "  [✓] Backward compatibility: MAINTAINED"
            echo "  [✓] Required fields: ALL PRESENT"
            echo ""
            echo "Running ReadyAPI tests..."
            echo "  testrunner -s api-tests/SmartBear-TestSuite.xml"
            echo ""
            echo "Test Results:"
            echo "  Total: 45 tests"
            echo "  Passed: 45"
            echo "  Failed: 0"
            echo "  Skipped: 0"
            echo ""
            echo "Contract Tests: PASSED"
      - notify-taillight:
          status: "success"
          stage: "contract-tests"
          message: "SmartBear contract tests passed"
      - notify-taillight-failure:
          stage: "contract-tests"

  code-quality:
    executor: base
    steps:
      - checkout
      - run:
          name: Run Code Quality Checks
          command: |
            echo "=== Code Quality Checks ==="
            echo ""
            echo "Running linters and static analysis..."
            echo ""
            echo "Results:"
            echo "  [✓] Checkstyle: 0 violations"
            echo "  [✓] SpotBugs: 0 bugs found"
            echo "  [✓] ESLint: 0 errors, 0 warnings"
            echo "  [✓] Prettier: All files formatted"
            echo ""
            echo "Code Quality: PASSED"
      - notify-taillight:
          status: "success"
          stage: "code-quality"
          message: "Code quality passed"
      - notify-taillight-failure:
          stage: "code-quality"

workflows:
  pr-checks:
    jobs:
      - sonarqube-analysis
      - semgrep-scan
      - sox-compliance
      - smartbear-contract-tests
      - code-quality
