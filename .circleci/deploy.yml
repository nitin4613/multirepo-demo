version: 2.1

orbs:
  github-cli: circleci/github-cli@2.7.2
  aws-cli: circleci/aws-cli@5.4.1

executors:
  deploy:
    docker:
      - image: cimg/deploy:2025.01.1-node
    resource_class: small

commands:
  install-argo-rollouts-plugin:
    description: Install kubectl argo rollouts plugin
    steps:
      - run:
          name: Install kubectl-argo-rollouts plugin
          command: |
            curl -LO https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
            chmod +x kubectl-argo-rollouts-linux-amd64
            sudo mv kubectl-argo-rollouts-linux-amd64 /usr/local/bin/kubectl-argo-rollouts

  setup-eks:
    parameters:
      region:
        type: string
      cluster-name:
        type: string
    steps:
      - aws-cli/setup:
          role_arn: arn:aws:iam::992382483259:role/cera-fe-pipeline-role
          region: << parameters.region >>
          profile_name: circleci-oidc
          role_session_name: circleci-deploy-<< pipeline.number >>
          session_duration: "1800"
      - run:
          name: Configure kubectl
          command: aws eks update-kubeconfig --name << parameters.cluster-name >> --region << parameters.region >> --profile circleci-oidc

  notify-taillight:
    parameters:
      stage:
        type: string
      status:
        type: string
    steps:
      - run:
          name: Notify Taillight
          command: |
            echo "Taillight: << parameters.stage >> - << parameters.status >>"

  log-snowflake:
    parameters:
      event:
        type: string
    steps:
      - run:
          name: Log to Snowflake
          command: |
            echo "Snowflake: << parameters.event >> | $(date -u +%Y-%m-%dT%H:%M:%SZ)"

  notify-showroom:
    parameters:
      status:
        type: string
      message:
        type: string
    steps:
      - run:
          name: Notify Showroom
          command: |
            echo "Showroom: << parameters.status >> - << parameters.message >>"

jobs:
  promote-image:
    executor: deploy
    steps:
      - run:
          name: Promote << pipeline.deploy.component_name >>:<< pipeline.deploy.target_version >>
          command: |
            echo "======================================"
            echo "Image Promotion"
            echo "======================================"
            echo "Component: << pipeline.deploy.component_name >>"
            echo "Version:   << pipeline.deploy.target_version >>"
            echo "Registry:  ghcr.io/awesomecicd/cargurus-multi-repo"
            echo "======================================"
            echo ""
            echo "Image promoted and ready for deployment"
      - log-snowflake:
          event: image_promoted

  deploy-canary:
    parameters:
      region:
        type: enum
        enum: ["namer", "emea"]
      aws-region:
        type: string
      cluster-name:
        type: string
      environment-name:
        type: string
    executor: deploy
    steps:
      - checkout
      - setup-eks:
          region: << parameters.aws-region >>
          cluster-name: << parameters.cluster-name >>
      - run:
          name: Deploy << pipeline.deploy.component_name >> canary to << parameters.region >>
          command: |
            echo "======================================"
            echo "Canary Deployment - << parameters.region >>"
            echo "======================================"
            echo "Component:   << pipeline.deploy.component_name >>"
            echo "Version:     << pipeline.deploy.target_version >>"
            echo "Namespace:   << pipeline.deploy.namespace >>"
            echo "Cluster:     << parameters.cluster-name >>"
            echo "Environment: << parameters.environment-name >>"
            echo "======================================"
            helm upgrade --atomic --install << pipeline.deploy.component_name >> ./helm \
              --namespace << pipeline.deploy.namespace >> \
              --set fullnameOverride=<< pipeline.deploy.component_name >> \
              --set image.tag=<< pipeline.deploy.target_version >> \
              --set image.repository=ghcr.io/awesomecicd/cargurus-multi-repo \
              --set rollout.enabled=true \
              --set region=<< parameters.region >> \
              --set istio.gateway=istio-ingress/<< parameters.region >>-istio-gateway-subdomains \
              --set circleci.componentName=<< pipeline.deploy.component_name >> \
              --set circleci.version=<< pipeline.deploy.target_version >>
      - run:
          name: Register release plan for << parameters.environment-name >>
          command: |
            circleci run release plan << parameters.environment-name >> \
              --environment-name=<< parameters.environment-name >> \
              --component-name=<< pipeline.deploy.component_name >> \
              --target-version=<< pipeline.deploy.target_version >> \
              --namespace=<< pipeline.deploy.namespace >> \
              --release-strategy=progressive
      - log-snowflake:
          event: canary_deployed_<< parameters.region >>

  monitor-namer:
    type: release
    plan_name: Car-Gurus-Multi-Repo-Production-NA

  monitor-emea:
    type: release
    plan_name: Car-Gurus-Multi-Repo-Production-EU

  wait-analysis:
    parameters:
      region:
        type: enum
        enum: ["namer", "emea"]
      aws-region:
        type: string
      cluster-name:
        type: string
      environment-name:
        type: string
    executor: deploy
    steps:
      - checkout
      - setup-eks:
          region: << parameters.aws-region >>
          cluster-name: << parameters.cluster-name >>
      - install-argo-rollouts-plugin
      - run:
          name: Wait for << pipeline.deploy.component_name >> analysis [<< parameters.region >>]
          command: |
            kubectl-argo-rollouts status << pipeline.deploy.component_name >> \
              -n << pipeline.deploy.namespace >> --watch --timeout=600s
      - run:
          name: Verify << pipeline.deploy.component_name >> analysis passed [<< parameters.region >>]
          command: |
            PHASE=$(kubectl get rollout << pipeline.deploy.component_name >> \
              -n << pipeline.deploy.namespace >> -o jsonpath='{.status.phase}')
            echo "Rollout Phase: $PHASE"
            if [ "$PHASE" = "Degraded" ]; then
              echo "ERROR: Rollout is degraded - analysis failed"
              exit 1
            fi
            echo "Analysis passed successfully"
      - log-snowflake:
          event: analysis_passed_<< parameters.region >>
      - run:
          name: Handle auto-rollback
          when: on_fail
          command: |
            echo "Analysis failed - Argo auto-rollback triggered"
            kubectl-argo-rollouts status << pipeline.deploy.component_name >> \
              -n << pipeline.deploy.namespace >> --timeout=300s || true

  full-rollout:
    parameters:
      region:
        type: enum
        enum: ["namer", "emea"]
      aws-region:
        type: string
      cluster-name:
        type: string
      environment-name:
        type: string
    executor: deploy
    steps:
      - checkout
      - setup-eks:
          region: << parameters.aws-region >>
          cluster-name: << parameters.cluster-name >>
      - install-argo-rollouts-plugin
      - run:
          name: Promote << pipeline.deploy.component_name >> to full rollout [<< parameters.region >>]
          command: |
            echo "======================================"
            echo "Full Rollout - << parameters.region >>"
            echo "======================================"
            echo "Component: << pipeline.deploy.component_name >>"
            echo "Version:   << pipeline.deploy.target_version >>"
            echo "Namespace: << pipeline.deploy.namespace >>"
            echo "======================================"
            kubectl-argo-rollouts promote << pipeline.deploy.component_name >> \
              -n << pipeline.deploy.namespace >> --full
            kubectl-argo-rollouts status << pipeline.deploy.component_name >> \
              -n << pipeline.deploy.namespace >> --timeout=600s
            echo ""
            echo "Full rollout completed successfully!"
      - log-snowflake:
          event: rollout_success_<< parameters.region >>

  create-release:
    executor: deploy
    steps:
      - checkout
      - github-cli/setup:
          token: GH_TOKEN
      - run:
          name: Create release
          command: |
            gh release create "v<< pipeline.deploy.target_version >>" \
              --title "<< pipeline.deploy.component_name >> v<< pipeline.deploy.target_version >>" \
              --notes "Production deployment" \
              --generate-notes || echo "Release exists"
      - log-snowflake:
          event: release_created

workflows:
  production-deploy:
    jobs:
      - promote-image:
          name: Promote Docker Image to Production
          context: [cargurus_demo]

      - deploy-canary:
          name: Mach5 Deploy to Production Canary NA
          region: namer
          aws-region: us-west-2
          cluster-name: cera-usw2-namer
          environment-name: Car-Gurus-Multi-Repo-Production-NA
          context: [cargurus_demo, cargurus-oidc]
          requires:
            - Promote Docker Image to Production

      - deploy-canary:
          name: Mach5 Deploy to Production Canary EU
          region: emea
          aws-region: eu-west-2
          cluster-name: cera-euw2-emea
          environment-name: Car-Gurus-Multi-Repo-Production-EU
          context: [cargurus_demo, cargurus-oidc]
          requires:
            - Promote Docker Image to Production

      - monitor-namer:
          name: Monitor Release NA
          requires:
            - Mach5 Deploy to Production Canary NA

      - monitor-emea:
          name: Monitor Release EU
          requires:
            - Mach5 Deploy to Production Canary EU

      - wait-analysis:
          name: Wait for Argo Rollouts Canary Analysis NA
          region: namer
          aws-region: us-west-2
          cluster-name: cera-usw2-namer
          environment-name: Car-Gurus-Multi-Repo-Production-NA
          context: [cargurus_demo, cargurus-oidc]
          requires:
            - Monitor Release NA

      - wait-analysis:
          name: Wait for Argo Rollouts Canary Analysis EU
          region: emea
          aws-region: eu-west-2
          cluster-name: cera-euw2-emea
          environment-name: Car-Gurus-Multi-Repo-Production-EU
          context: [cargurus_demo, cargurus-oidc]
          requires:
            - Monitor Release EU

      - full-rollout:
          name: Wait for Full Rollout by Argo NA
          region: namer
          aws-region: us-west-2
          cluster-name: cera-usw2-namer
          environment-name: Car-Gurus-Multi-Repo-Production-NA
          context: [cargurus_demo, cargurus-oidc]
          requires:
            - Wait for Argo Rollouts Canary Analysis NA

      - full-rollout:
          name: Wait for Full Rollout by Argo EU
          region: emea
          aws-region: eu-west-2
          cluster-name: cera-euw2-emea
          environment-name: Car-Gurus-Multi-Repo-Production-EU
          context: [cargurus_demo, cargurus-oidc]
          requires:
            - Wait for Argo Rollouts Canary Analysis EU

      - create-release:
          name: Create GitHub Release
          context: [cargurus_demo]
          requires:
            - Wait for Full Rollout by Argo NA
            - Wait for Full Rollout by Argo EU
